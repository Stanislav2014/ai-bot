name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Test (pytest)
        env:
          # Required by pydantic-settings — fake values, never hit network in tests
          TELEGRAM_BOT_TOKEN: dummy-token-for-tests
          LLM_BASE_URL: http://localhost:9999
        run: python -m pytest tests/ -v
