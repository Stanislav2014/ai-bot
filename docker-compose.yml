services:
  lemonade:
    build: ./lemonade
    container_name: lemonade
    ports:
      - "8000:8000"
    volumes:
      - lemonade_cache:/root/.cache
    restart: unless-stopped

  bot:
    build: .
    container_name: ai-bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - lemonade
    restart: unless-stopped

volumes:
  lemonade_cache:
